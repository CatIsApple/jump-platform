name: Build Worker Binaries (Fast / PyInstaller)

# main 브랜치 푸시 시 빠른 검증 빌드 (PyInstaller 기반, 릴리즈용 아님).
# 태그 푸시 시 Release는 별도 워크플로우(build-release-nuitka.yml)가 담당.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'jump_worker_dashboard/**'
      - 'jump_site_modules/**'
      - '.github/workflows/build-worker-binaries.yml'

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Copy jump_site_modules into build context
        run: cp -r jump_site_modules jump_worker_dashboard/jump_site_modules

      - name: Build macOS package
        run: |
          cd jump_worker_dashboard
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: jump-worker-dashboard-macos-fast
          path: |
            jump_worker_dashboard/dist/jump-worker-dashboard-macos.zip
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Copy jump_site_modules into build context
        shell: pwsh
        run: Copy-Item -Recurse jump_site_modules jump_worker_dashboard\jump_site_modules

      - name: Build Windows package (PyInstaller)
        shell: powershell
        run: |
          Set-Location jump_worker_dashboard
          powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc jump_worker_dashboard\installer\guardian-setup.iss /O"jump_worker_dashboard\dist" /Q

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jump-worker-dashboard-windows-fast
          path: |
            jump_worker_dashboard/dist/GUARDIAN_Jump_Setup.exe
          retention-days: 7
