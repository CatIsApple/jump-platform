name: Build Worker Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build macOS package
        run: |
          cd jump_worker_dashboard
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: jump-worker-dashboard-macos
          path: |
            jump_worker_dashboard/dist/jump-worker-dashboard-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build Windows package
        shell: powershell
        run: |
          Set-Location jump_worker_dashboard
          powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1
          Compress-Archive -Path .\dist\jump-worker-dashboard\* -DestinationPath .\dist\jump-worker-dashboard-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: jump-worker-dashboard-windows
          path: |
            jump_worker_dashboard/dist/jump-worker-dashboard-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: jump-worker-dashboard-macos
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: jump-worker-dashboard-windows
          path: release

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
